name: tempoll

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_SETUP_COMPLETE: ${APP_SETUP_COMPLETE:-false}
      APP_NAME: ${APP_NAME:-tempoll}
      APP_URL: ${APP_URL:?Set the public app URL, for example https://meet.example.com}
      LEGAL_PAGES_ENABLED: ${LEGAL_PAGES_ENABLED:-false}
      DATABASE_URL: postgresql://${TEMPOLL_DB_USER:-tempoll}:${SERVICE_PASSWORD_TEMPOLL_DB:?Set or let Coolify generate the database password secret}@db:5432/${TEMPOLL_DB_NAME:-tempoll}?schema=public
      OPERATOR_LEGAL_NAME: ${OPERATOR_LEGAL_NAME:-}
      OPERATOR_DISPLAY_NAME: ${OPERATOR_DISPLAY_NAME:-}
      OPERATOR_STREET_ADDRESS: ${OPERATOR_STREET_ADDRESS:-}
      OPERATOR_POSTAL_CODE: ${OPERATOR_POSTAL_CODE:-}
      OPERATOR_CITY: ${OPERATOR_CITY:-}
      OPERATOR_COUNTRY: ${OPERATOR_COUNTRY:-Austria}
      OPERATOR_EMAIL: ${OPERATOR_EMAIL:-}
      OPERATOR_PHONE: ${OPERATOR_PHONE:-}
      OPERATOR_WEBSITE: ${OPERATOR_WEBSITE:-}
      OPERATOR_BUSINESS_PURPOSE: ${OPERATOR_BUSINESS_PURPOSE:-}
      MEDIA_OWNER: ${MEDIA_OWNER:-}
      EDITORIAL_LINE: ${EDITORIAL_LINE:-}
      PRIVACY_CONTACT_EMAIL: ${PRIVACY_CONTACT_EMAIL:-}
      HOSTING_DESCRIPTION: ${HOSTING_DESCRIPTION:-}
      PRIVACY_PROCESSORS: ${PRIVACY_PROCESSORS:-}

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TEMPOLL_DB_NAME:-tempoll}
      POSTGRES_USER: ${TEMPOLL_DB_USER:-tempoll}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_TEMPOLL_DB:?Set or let Coolify generate the database password secret}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TEMPOLL_DB_USER:-tempoll} -d ${TEMPOLL_DB_NAME:-tempoll}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - tempoll-postgres:/var/lib/postgresql/data

volumes:
  tempoll-postgres:
