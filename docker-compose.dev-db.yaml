services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tempoll
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${TEMPOLL_DEV_DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tempoll"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 3s
    volumes:
      - tempoll-dev-postgres:/var/lib/postgresql/data

volumes:
  tempoll-dev-postgres:
